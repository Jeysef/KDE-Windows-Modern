<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style id="current-color-scheme" type="text/css">
      .ColorScheme-Text { color:#1E1E1E; stop-color:#1E1E1E; }
      .ColorScheme-Background { color:#F9F9F9; stop-color:#F9F9F9; }
      .ColorScheme-Highlight { color:#0078D4; stop-color:#0078D4; }
      .ColorScheme-ViewText { color:#1E1E1E; stop-color:#1E1E1E; }
      .ColorScheme-ViewBackground { color:#FFFFFF; stop-color:#FFFFFF; }
      .ColorScheme-ViewHover { color:#E9E9E9; stop-color:#E9E9E9; }
      .ColorScheme-ViewFocus { color:#0078D4; stop-color:#0078D4; }
      .ColorScheme-ButtonText { color:#1E1E1E; stop-color:#1E1E1E; }
      .ColorScheme-ButtonBackground { color:#F3F3F3; stop-color:#F3F3F3; }
      .ColorScheme-ButtonHover { color:#E9E9E9; stop-color:#E9E9E9; }
      .ColorScheme-ButtonFocus { color:#0078D4; stop-color:#0078D4; }
    </style>
  </defs>

  <g id="hint-stretch-borders">
    <rect width="100" height="100" fill="none"/>
  </g>

  <rect id="hint-tile-center" x="0" y="0" width="5" height="5" fill="#ff6600"/>

  <rect id="hint-left-margin" x="0" y="0" width="8" height="8" opacity="0"/>
  <rect id="hint-top-margin" x="0" y="0" width="8" height="8" opacity="0"/>
  <rect id="hint-right-margin" x="92" y="0" width="8" height="8" opacity="0"/>
  <rect id="hint-bottom-margin" x="0" y="92" width="8" height="8" opacity="0"/>

  <rect id="shadow-hint-top-margin" x="0" y="0" width="0" height="0"/>
  <rect id="shadow-hint-bottom-margin" x="0" y="0" width="0" height="0"/>
  <rect id="shadow-hint-left-margin" x="0" y="0" width="0" height="0"/>
  <rect id="shadow-hint-right-margin" x="0" y="0" width="0" height="0"/>

  <!-- 7px rounded corners (translucent light) -->
  <rect id="topleft" x="0" y="0" width="7" height="7" fill="#F9F9F9" fill-opacity="0.92"/>
  <rect id="topright" x="93" y="0" width="7" height="7" fill="#F9F9F9" fill-opacity="0.92"/>
  <rect id="bottomleft" x="0" y="93" width="7" height="7" fill="#F9F9F9" fill-opacity="0.92"/>
  <rect id="bottomright" x="93" y="93" width="7" height="7" fill="#F9F9F9" fill-opacity="0.92"/>

  <!-- 1px border -->
  <rect id="top" x="7" y="0" width="86" height="1" fill="#E5E5E5"/>
  <rect id="bottom" x="7" y="99" width="86" height="1" fill="#E5E5E5"/>
  <rect id="left" x="0" y="7" width="1" height="86" fill="#E5E5E5"/>
  <rect id="right" x="99" y="7" width="1" height="86" fill="#E5E5E5"/>

  <!-- Center fill (translucent for acrylic effect) -->
  <rect id="center" x="1" y="1" width="98" height="98" fill="#F9F9F9" fill-opacity="0.92"/>
</svg>
